; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:firebeetle32]
platform = espressif32
board = firebeetle32
framework = arduino
monitor_speed = 115200
lib_deps =
    majicdesigns/MD_Parola@^3.7.3
    ; MD_MAX72xx is vendored in lib/MD_MAX72XX instead of pulled from the
    ; registry here, because it carries a local patch (SPI clock lowered
    ; from 8MHz to 1MHz in MD_MAX72xx.cpp) needed for reliable scrolling
    ; text over our jumper-wire wiring. Do not re-add a registry entry for
    ; it without preserving that patch.
build_flags =
    -D CORE_DEBUG_LEVEL=1
    ; Redirect the ESP-IDF core's startup call to esp_brownout_init() into our
    ; __wrap_esp_brownout_init() (src/brownout_override.c), which disables the
    ; over-sensitive on-chip brownout detector at core-init time -- before
    ; setup() runs. This is what stops the spurious "Brownout detector was
    ; triggered" / rst:0xc (SW_CPU_RESET) boot loop, durably, without needing a
    ; flash erase after every upload.
    -Wl,--wrap=esp_brownout_init
